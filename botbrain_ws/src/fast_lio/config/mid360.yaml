/**:
  ros__parameters:
    feature_extract_enable: false
    point_filter_num: 3
    max_iteration: 5  # 匹配 g1_3d_nav_ros2 参考配置
    filter_size_surf: 0.3  # 匹配参考：稀疏特征 → 更稳定，减少噪声引起的倾斜
    filter_size_map: 0.3   # 匹配参考
    cube_side_length: 1000.0
    runtime_pos_log_enable: false
    map_file_path: "/botbrain_ws/src/g1_pkg/maps/scans.pcd"

    common:
      lid_topic: "/livox/lidar"
      # Subscribe directly to the raw MID360 IMU. FAST-LIO applies the
      # upside-down R_x(pi) correction internally to avoid relay latency.
      imu_topic: "/livox/imu"
      imu_flip_yz: true
      # Keep at most about two seconds of input. Longer reliable queues turn a
      # temporary CPU stall into stale odometry and a large IMU integration gap.
      imu_queue_depth: 400
      lidar_queue_depth: 20
      # The robot logs show occasional 20-30 ms delivery gaps under load. Keep
      # those short gaps continuous; large discontinuities are still rebased.
      max_imu_gap: 0.03
      time_sync_en: false # ONLY turn on when external time synchronization is really not possible
      time_offset_lidar_to_imu:
        0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

    preprocess:
      lidar_type: 1 # 1 for Livox serials LiDAR
      scan_line: 4
      blind: 0.5
      # 0 disables the upper range filter. The corridor launch profile
      # overrides this to reduce weakly constrained far-wall matches.
      max_range: 0.0
      timestamp_unit: 3
      scan_rate: 10

    mapping:
      acc_cov: 0.1      # 匹配 g1_3d_nav_ros2 参考：强重力约束（原1.0），防止地图倾斜
      gyr_cov: 0.1      # 匹配参考：强角速度约束（原0.5）
      b_acc_cov: 0.0001
      b_gyr_cov: 0.0001
      fov_degree: 360.0
      det_range: 30.0
      guard_enable: true
      # LiDAR update is a correction to the IMU prediction, not the robot's
      # physical per-frame motion. Keep this strict so a corridor mismatch or
      # timing/extrinsic fault cannot write a 20-45 degree jump into the map.
      guard_min_effective_points: 100
      guard_min_effective_ratio: 0.10
      guard_max_residual: 0.15
      guard_max_translation_correction: 0.25
      guard_max_rotation_correction_deg: 5.0
      # 连续拒帧后允许一次“只修状态、不写地图”的高置信恢复，避免纯 IMU 越漂越远后永久锁死。
      guard_recovery_min_rejections: 5
      guard_recovery_min_effective_points: 60
      guard_recovery_min_effective_ratio: 0.15
      guard_recovery_max_residual: 0.10
      guard_recovery_max_translation_correction: 0.75
      guard_recovery_max_rotation_correction_deg: 15.0
      # 最多发布 3 帧未被 LiDAR 确认的纯 IMU 里程计。持续失败时停止 TF，
      # 让 localization/costmap 超时并停车，而不是继续使用发散位姿。
      guard_max_unconfirmed_odometry_frames: 3
      guard_max_consecutive_rejections: 30
      guard_max_position_norm: 1000.0
      guard_max_abs_z: 5.0
      guard_max_velocity_norm: 20.0
      extrinsic_est_en: false  # MID360 LiDAR-to-built-in-IMU extrinsic is fixed
      # LiDAR pose in the MID360 built-in IMU frame (centimetre scale).
      # 1.247 m is the robot sensor height above the floor, NOT this extrinsic.
      extrinsic_T: [-0.011, -0.02329, 0.04412]
      extrinsic_R: [1., 0., 0., 0., 1., 0., 0., 0., 1.]

    publish:
      path_en: true # true: publish Path
      effect_map_en: false # true: publish Effects
      # /Laser_map_1 rebuilds and republishes an ever-growing history cloud.
      # Mapping, grid generation and PCD saving use other validated buffers.
      map_en: false
      scan_publish_en: true # false: close all the point cloud output
      dense_publish_en: false # false: low down the points number in a global-frame point clouds scan.
      scan_bodyframe_pub_en: true # true: output the point cloud scans in IMU-body-frame

    pcd_save:
      pcd_save_en: false  # 导航安全默认；仅在按 runbook 正式建图时临时改为 true
      interval:
        -1 # how many LiDAR frames saved in each pcd file;
        # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
