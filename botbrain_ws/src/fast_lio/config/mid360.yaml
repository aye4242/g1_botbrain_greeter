/**:
  ros__parameters:
    feature_extract_enable: false
    point_filter_num: 3
    max_iteration: 3  # 匹配 g1_3d_nav_ros2 参考配置
    filter_size_surf: 0.5  # 匹配参考：稀疏特征 → 更稳定，减少噪声引起的倾斜
    filter_size_map: 0.5   # 匹配参考
    cube_side_length: 1000.0
    runtime_pos_log_enable: false
    map_file_path: "/botbrain_ws/src/g1_pkg/maps/scans.pcd"

    common:
      lid_topic: "/livox/lidar"
      # MID360 is mounted roll-180. The driver applies the configured
      # extrinsic to LiDAR points, while imu_flip.py applies the same
      # R_x(pi) transform to the raw IMU Y/Z axes.
      imu_topic: "/livox/imu_corrected"
      time_sync_en: false # ONLY turn on when external time synchronization is really not possible
      time_offset_lidar_to_imu:
        0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
        # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

    preprocess:
      lidar_type: 1 # 1 for Livox serials LiDAR
      scan_line: 4
      blind: 0.5
      timestamp_unit: 3
      scan_rate: 10

    mapping:
      acc_cov: 0.1      # 匹配 g1_3d_nav_ros2 参考：强重力约束（原1.0），防止地图倾斜
      gyr_cov: 0.1      # 匹配参考：强角速度约束（原0.5）
      b_acc_cov: 0.0001
      b_gyr_cov: 0.0001
      fov_degree: 360.0
      det_range: 100.0
      extrinsic_est_en: false  # MID360 LiDAR-to-built-in-IMU extrinsic is fixed
      # LiDAR pose in the MID360 built-in IMU frame (centimetre scale).
      # 1.247 m is the robot sensor height above the floor, NOT this extrinsic.
      extrinsic_T: [-0.011, -0.02329, 0.04412]
      extrinsic_R: [1., 0., 0., 0., 1., 0., 0., 0., 1.]

    publish:
      path_en: true # true: publish Path
      effect_map_en: false # true: publish Effects
      map_en: true # true: publish Map cloud
      scan_publish_en: true # false: close all the point cloud output
      dense_publish_en: false # false: low down the points number in a global-frame point clouds scan.
      scan_bodyframe_pub_en: true # true: output the point cloud scans in IMU-body-frame

    pcd_save:
      pcd_save_en: true  # 建图时设为 true；定位/导航时设为 false，避免退出时覆盖地图
      interval:
        -1 # how many LiDAR frames saved in each pcd file;
        # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
