pointcloud_to_laserscan_node:
  ros__parameters:
    # Transform the FAST-LIO body cloud into the planar navigation frame before
    # height filtering. Filtering in body would let normal gait roll/pitch make
    # the floor look sloped and leak into the obstacle band.
    target_frame: "g1_robot/base_footprint"
    # FAST-LIO cloud and the planar localization TF cross container/Zenoh
    # boundaries. A small lookup wait prevents an occasional missing /scan
    # frame without reintroducing the old 0.20 s scan latency.
    transform_tolerance: 0.10
    min_height: 0.20
    max_height: 1.35
    angle_min: -3.1415926
    angle_max: 3.1415926
    angle_increment: 0.007
    scan_time: 0.1
    # Ignore near-body returns from legs, shell, cables, and floor splash.
    range_min: 0.45
    range_max: 5.0
    use_inf: true
    inf_epsilon: 1.0
    # Buffer clouds briefly while the matching planar TF arrives over Zenoh.
    queue_size: 10
