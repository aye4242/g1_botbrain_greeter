/**/planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      allow_unknown: true
      use_astar: true
      motion_model_for_search: "VON_NEUMANN"
      downsample_costmap: false
      tolerance: 0.1
      max_iterations: 500000
      cost_travel_multiplier: 20.0


/**/controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    speed_limit_topic: "speed_limit"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 30.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.10
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      ax_max: 0.4
      ax_min: -0.5
      ay_max: 0.0
      ay_min: 0.0
      az_max: 2.5
      vx_std: 0.6
      vy_std: 0.0
      wz_std: 0.6
      vx_max: 0.3
      vx_min: -0.3
      vy_max: 0.0
      wz_max: 2.0
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 1.0
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      publish_optimal_trajectory: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic"
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

/**/bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: <prefix>map
    robot_base_frame: <prefix>base_footprint
    odom_topic: /<prefix>odom
    default_bt_xml_filename: "navigate_w_replanning_time.xml"
    navigators: ["navigate_to_pose"]

/**/global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: <prefix>map
      robot_base_frame: <prefix>base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: false
      resolution: 0.05

      footprint: "[[0.175, 0.255], [0.175, -0.255], [-0.175, -0.255], [-0.175, 0.255]]"
      footprint_padding: 0.02   

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: '/map'                      # absolute path: map_server runs without namespace
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        footprint_clearing_enabled: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: cloud
        footprint_clearing_enabled: true
        cloud:
          topic: /cloud_registered_body_1
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_range: 5.0
          raytrace_range: 3.0
          min_obstacle_height: 0.20  # humanoid gait tilt causes ground points to appear up to ~0.12m; 0.15 gives margin
          max_obstacle_height: 1.30
          observation_persistence: 0.0
          observation_queue_length: 50

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4
        cost_scaling_factor: 5.0

/**/local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: <prefix>map
      robot_base_frame: <prefix>base_footprint
      transform_tolerance: 1.0
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0

      footprint: "[[0.175, 0.225], [0.175, -0.225], [-0.175, -0.225], [-0.175, 0.225]]"
      footprint_padding: 0.02

      track_unknown_space: false
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: cloud
        footprint_clearing_enabled: true
        cloud:
          topic: /cloud_registered_body_1
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_range: 3.0
          raytrace_range: 3.0
          min_obstacle_height: 0.20
          max_obstacle_height: 1.30
          observation_persistence: 0.0
          observation_queue_length: 50

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.2
        cost_scaling_factor: 10.0

/**/behavior_server:
  ros__parameters:
    local_costmap_topic: /<prefix>local_costmap/costmap_raw
    global_costmap_topic: /<prefix>global_costmap/costmap_raw
    local_footprint_topic: /<prefix>local_costmap/published_footprint
    global_footprint_topic: /<prefix>global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: <prefix>odom
    global_frame: <prefix>map
    robot_base_frame: <prefix>base_footprint
    transform_tolerance: 1.0
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
