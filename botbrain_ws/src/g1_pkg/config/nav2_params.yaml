/**/planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      allow_unknown: true
      use_astar: true
      motion_model_for_search: "VON_NEUMANN"
      downsample_costmap: false
      tolerance: 0.10         # keep the path endpoint close to the requested pose
      max_iterations: 500000
      cost_travel_multiplier: 15.0   # 20.0→15.0: 降低高代价区域惩罚，避免迭代耗尽


/**/controller_server:
  ros__parameters:
    controller_frequency: 12.0        # 20.0→12.0: 降频给MPPI+Omni足够算力，消除停顿
    # Pose follows the same FAST-LIO state as odom->base TF; twist is copied
    # from Unitree odometry by nav_odom_relay.
    odom_topic: /<prefix>nav_odom
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.10   # 0.5→0.10: 配合vy_max=0.20，有效横向速度区间0.10~0.20
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    speed_limit_topic: "speed_limit"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Count slow but real progress on smooth floors without masking a stall.
      required_movement_radius: 0.15
      movement_time_allowance: 40.0
    general_goal_checker:
      stateful: False                # True→False: 同时校验xy+yaw，避免旋转修正后横漂死循环
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15        # planner + goal-checker error stays near 0.25 m worst-case
      yaw_goal_tolerance: 0.25       # retain the robot-side precision setting
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      # MPPI requires model_dt >= controller period. At 12 Hz the period is
      # exactly 1/12 s; 30 steps preserve the previous ~2.5 s horizon.
      time_steps: 30
      model_dt: 0.08333333333333333
      batch_size: 1800               # 2000→1800: 减少15%采样数，缓解控制周期超时
      ax_max: 0.4
      ax_min: -0.5
      ay_max: 0.20   # 恢复横向加速度
      ay_min: -0.20
      az_max: 2.5
      vx_std: 0.6
      vy_std: 0.08   # 恢复横向速度采样
      wz_std: 0.6
      vx_max: 0.3
      vx_min: -0.3
      vy_max: 0.15   # 恢复横向速度
      vy_min: -0.15
      wz_max: 0.8    # 1.2→0.8: 进一步限制旋转速度，旋转过快是ICP丢失的主因
      iteration_count: 2             # 1→2: 每控制周期双次优化，消除转弯停顿
      prune_distance: 1.7
      transform_tolerance: 1.0
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"    # DiffDrive→Omni: 恢复全向，配合12Hz控制频率消除停顿
      visualize: false              # Disable the large sampled-trajectory debug cloud.
      publish_optimal_trajectory: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic"
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0           # 3.0→2.0: 降低终点朝向权重，减少到点后旋转微调冲动
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

/**/bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: <prefix>map
    robot_base_frame: <prefix>base_footprint
    odom_topic: /<prefix>nav_odom
    navigators: ["navigate_to_pose"]
    # The Nav2 defaults (10 ms loop, 20 ms server timeout) are too aggressive
    # for Jetson + multi-container Zenoh scheduling and can cancel FollowPath
    # while the robot is still executing a valid path.
    bt_loop_duration: 50
    default_server_timeout: 500
    wait_for_service_timeout: 2000
    default_nav_to_pose_bt_xml: "<nav_to_pose_bt_xml>"

/**/global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: <prefix>map
      robot_base_frame: <prefix>base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: false
      resolution: 0.05

      footprint: "[[0.175, 0.255], [0.175, -0.255], [-0.175, -0.255], [-0.175, 0.255]]"
      footprint_padding: 0.02   

      # Keep global planning aware of nearby dynamic obstacles, but use the
      # filtered /scan source with explicit clearing instead of raw PointCloud2.
      plugins: ["static_layer", "obstacle_layer", "denoise_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: '/map'                      # absolute path: map_server runs without namespace
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        footprint_clearing_enabled: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 3.0
          obstacle_min_range: 0.45
          raytrace_max_range: 4.5
          raytrace_min_range: 0.20
          inf_is_valid: true
          # Tolerate a short guarded FAST-LIO/TF recovery. A persistent outage
          # still marks the costmap stale and stops navigation.
          expected_update_rate: 1.0
          observation_persistence: 0.0

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        # Remove only isolated one-cell speckles. Larger values can erase real
        # narrow obstacles and also affect small obstacles from the static map.
        minimal_group_size: 2
        group_connectivity_type: 8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Cover the padded footprint's ~0.34 m circumscribed radius so SmacPlanner
        # can perform reliable non-circular footprint collision checks.
        inflation_radius: 0.35
        cost_scaling_factor: 15.0  # faster decay narrows soft cost without shrinking collision radius

/**/local_costmap:
  local_costmap:
    ros__parameters:
      # Keep the rolling local costmap continuous across map->odom ICP/manual
      # corrections. Global planning remains in <prefix>map.
      global_frame: <prefix>odom
      robot_base_frame: <prefix>base_footprint
      transform_tolerance: 1.0
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0

      footprint: "[[0.175, 0.225], [0.175, -0.225], [-0.175, -0.225], [-0.175, 0.225]]"
      footprint_padding: 0.02

      track_unknown_space: false
      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.45
          raytrace_max_range: 4.5
          raytrace_min_range: 0.20
          inf_is_valid: true
          expected_update_rate: 1.0
          observation_persistence: 0.0

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        # Preserve small real obstacles while rejecting isolated scan noise.
        minimal_group_size: 2
        group_connectivity_type: 8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Cover the local padded footprint's ~0.32 m circumscribed radius.
        inflation_radius: 0.35
        cost_scaling_factor: 10.0

/**/behavior_server:
  ros__parameters:
    local_costmap_topic: /<prefix>local_costmap/costmap_raw
    global_costmap_topic: /<prefix>global_costmap/costmap_raw
    local_footprint_topic: /<prefix>local_costmap/published_footprint
    global_footprint_topic: /<prefix>global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: <prefix>odom
    global_frame: <prefix>map
    robot_base_frame: <prefix>base_footprint
    transform_tolerance: 1.0
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8    # 1.0→0.8: 恢复行为转身速度上限，防止ICP漂移
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.0    # 3.2→2.0: 降低旋转加速度，平稳转身
