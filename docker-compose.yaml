services:
  base:
    image: botbotrobotics/botbrain:base
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - ./deps/open3d141:/opt/open3d:ro
      - /dev:/dev
      - /run:/run
      - /usr/local/include:/opt/robot_sdk/include:ro
      - /usr/local/lib:/opt/robot_sdk/lib:ro
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      CYCLONEDDS_URI: "file:///botbrain_ws/cyclonedds_config.xml"
      UNITREE_SDK2_ROOT: /opt/robot_sdk
      LD_LIBRARY_PATH: /opt/open3d/lib

  nav3d:
    image: botbotrobotics/botbrain:nav3d
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - ./deps/open3d141:/opt/open3d:ro
      - /dev:/dev
      - /run:/run
      - /usr/local/include:/opt/robot_sdk/include:ro
      - /usr/local/lib:/opt/robot_sdk/lib:ro
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      CYCLONEDDS_URI: "file:///botbrain_ws/cyclonedds_config.xml"
      UNITREE_SDK2_ROOT: /opt/robot_sdk
      LD_LIBRARY_PATH: /opt/open3d/lib

  dev:
    extends: base
    container_name: g1_robot_dev
    user: root
    command: ["bash", "-lc", "bash"]

  builder_base:
    extends: nav3d
    container_name: g1_robot_builder_base
    command: ["bash", "-lc", "colcon build --packages-select \
          go2_pkg \
          tita_pkg \
          bot_bringup \
          bot_description \
          bot_custom_interfaces \
          joystick_bot \
          bot_localization \
          bot_navigation \
          bot_localization_interfaces \
          bot_state_machine \
          bot_jetson_stats \
          bot_jetson_stats_interfaces \
          bot_rosa \
          g1_pkg \
          go2w_pkg \
          g1_manipulation_pkg \
          fast_lio \
          open3d_loc \
          --cmake-args -DOpen3D_DIR=/opt/open3d/lib/cmake/Open3D"]

  state_machine:
    extends: base
    container_name: g1_robot_state_machine
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_state_machine state_machine.launch.py"]
    restart: always
  
  bringup:
    extends: base
    container_name: g1_robot_bringup
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_bringup bringup.launch.py"]
    restart: always


  foxglove:
    extends: base
    container_name: g1_robot_foxglove
    command: ["bash", "-lc", "source install/setup.bash && ros2 run foxglove_bridge foxglove_bridge --ros-args --params-file src/bot_bringup/config/foxglove_bridge_params.yaml"]
    restart: always


  fast_lio:
    extends: nav3d
    container_name: g1_robot_fast_lio
    command: ["bash", "-lc", "sleep 15 && source install/setup.bash && ros2 launch g1_pkg fast_lio.launch.py"]
    restart: always

  localization:
    extends: nav3d
    container_name: g1_robot_localization
    command: ["bash", "-lc", "sleep 30 && source install/setup.bash && export LD_LIBRARY_PATH=/opt/open3d/lib:$LD_LIBRARY_PATH && ros2 launch g1_pkg localization_3d.launch.py"]
    restart: always

  navigation:
    extends: base
    container_name: g1_robot_navigation
    command: ["bash", "-lc", "sleep 30 && source install/setup.bash && ros2 launch bot_navigation navigation.launch.py"]
    restart: always

  manipulation:
    build:
      context: .
      dockerfile: docker/Dockerfile.manipulation
    image: botbotrobotics/botbrain:manipulation
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - /dev:/dev
      - /run:/run
      - /usr/local/include:/opt/robot_sdk/include:ro
      - /usr/local/lib:/opt/robot_sdk/lib:ro
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      UNITREE_SDK2_ROOT: /opt/robot_sdk
    container_name: g1_robot_manipulation
    command: ["bash", "/botbrain_ws/src/g1_manipulation_pkg/scripts/start_manipulation.sh"]
    restart: always

  jetson_stats:
    extends: base
    container_name: g1_robot_jetson_stats
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_jetson_stats stats.launch.py"]
    restart: always
    
  rosa:
    extends: base
    container_name: g1_robot_rosa
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_rosa rosa.launch.py"]
    restart: always

  yolo_base:
    image: botbotrobotics/botbrain:yolo
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    shm_size: 2gb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      YOLO_CONFIG_DIR: /root/.cache/ultralytics
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      CYCLONEDDS_URI: "file:///botbrain_ws/cyclonedds_config.xml"
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - /dev:/dev
      - /run:/run
      - ./botbrain_ws/src/bot_yolo/models:/root/.cache/ultralytics

  builder_yolo:
    extends: yolo_base
    container_name: g1_robot_builder_yolo
    command: ["bash", "-lc", "colcon build --packages-select \
          bot_yolo"]

  yolo:
    extends: yolo_base
    container_name: g1_robot_yolo
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_yolo yolo.launch.py"]
    restart: always

  dev_yolo:
    extends: yolo_base
    container_name: g1_robot_dev_yolo
    user: root
    command: ["bash"]

  web_server:
    image: node:22-bullseye
    working_dir: /app
    volumes:
      - ./frontend:/app
    env_file:
      - .env

  web_server_builder:
    extends: web_server
    container_name: g1_robot_web_server_builder
    network_mode: host
    command: sh -c "npm ci && npm run build:oss"

  web_server_dev:
    extends: web_server
    container_name: g1_robot_web_server_dev
    network_mode: host
    command: sh -c "npm install && npm run dev:oss"
    stdin_open: true
    tty: true

  web_server_prod:
    extends: web_server
    container_name: g1_robot_web_server_prod
    network_mode: host
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    command: npm run start
    restart: unless-stopped
  
  builder_dex3:
    image: unitree-dex3:humble
    container_name: g1_robot_builder_dex3
    network_mode: host
    volumes:
      - ./botbrain_ws/:/botbrain_ws
    command: ["bash", "-lc", "
      source /opt/ros/humble/setup.bash &&
      source /opt/unitree_ros2/cyclonedds_ws/install/setup.bash &&
      cd /botbrain_ws &&
      colcon build --base-paths src
        --packages-select fcl trac_ik_lib unitree_g1_dex3_stack
        --cmake-args -DBUILD_IK_FCL_OMPL_PLANNER=ON -DPython3_EXECUTABLE=/usr/bin/python3 &&
      pip3 install --no-build-isolation --no-deps -e src/g1_right_dex3/unitree_dex3_cpp"]

  dev_dex3:
    image: unitree-dex3:humble
    container_name: g1_robot_dev_dex3
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - /dev:/dev
      - /run:/run
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      LD_LIBRARY_PATH: /usr/local/lib
      CYCLONEDDS_URI: "file:///botbrain_ws/cyclonedds_config.xml"
      PYTHONPATH: /opt/unitree_dex3_tools:/botbrain_ws/src/g1_right_dex3/unitree_dex3_cpp/build
    command: ["sleep", "infinity"]
    restart: unless-stopped
