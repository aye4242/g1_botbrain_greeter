x-robot-env: &robot-env
  env_file:
    - path: ${BOTBRAIN_ROBOT_ENV_FILE:-/etc/botbrain/robot.env}
      required: false

services:
  base:
    image: botbotrobotics/botbrain:base
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - ./deps/open3d141:/opt/open3d:ro
      - /dev:/dev
      - /run:/run
      - /usr/local/include:/opt/robot_sdk/include:ro
      - /usr/local/lib:/opt/robot_sdk/lib:ro
    environment:
      RMW_IMPLEMENTATION: rmw_zenoh_cpp
      ZENOH_CONFIG_OVERRIDE: 'mode="client";connect/endpoints=["tcp/127.0.0.1:7448"]'
      UNITREE_SDK2_ROOT: /opt/robot_sdk
      LD_LIBRARY_PATH: /opt/open3d/lib

  nav3d:
    <<: *robot-env
    image: botbotrobotics/botbrain:nav3d
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - ./deps/open3d141:/opt/open3d:ro
      - /dev:/dev
      - /run:/run
      - /usr/local/include:/opt/robot_sdk/include:ro
      - /usr/local/lib:/opt/robot_sdk/lib:ro
    environment:
      RMW_IMPLEMENTATION: rmw_zenoh_cpp
      ZENOH_CONFIG_OVERRIDE: 'mode="client";connect/endpoints=["tcp/127.0.0.1:7448"]'
      UNITREE_SDK2_ROOT: /opt/robot_sdk
      LD_LIBRARY_PATH: /opt/open3d/lib

  dev:
    extends: base
    container_name: g1_robot_dev
    user: root
    command: ["bash", "-lc", "bash"]

  builder_base:
    extends: nav3d
    container_name: g1_robot_builder_base
    command: ["bash", "-lc", "colcon build --packages-select \
          go2_pkg \
          tita_pkg \
          bot_bringup \
          bot_description \
          bot_custom_interfaces \
          joystick_bot \
          bot_localization \
          bot_navigation \
          bot_localization_interfaces \
          bot_state_machine \
          bot_jetson_stats \
          bot_jetson_stats_interfaces \
          bot_rosa \
          g1_pkg \
          go2w_pkg \
          g1_manipulation_pkg \
          fast_lio \
          open3d_loc \
          --cmake-args -DOpen3D_DIR=/opt/open3d/lib/cmake/Open3D"]

  zenoh:
    image: botbotrobotics/botbrain:nav3d
    network_mode: host
    ipc: host
    container_name: g1_robot_zenoh
    command: ["bash", "-lc", "source /opt/ros/humble/setup.bash && ZENOH_CONFIG_OVERRIDE='listen/endpoints=[\"tcp/0.0.0.0:7448\"]' ros2 run rmw_zenoh_cpp rmw_zenohd"]
    restart: always

  state_machine:
    extends: base
    container_name: g1_robot_state_machine
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_state_machine state_machine.launch.py"]
    restart: always
  
  bringup:
    extends: base
    container_name: g1_robot_bringup
    environment:
      UNITREE_VELOCITY_FRAME: ${UNITREE_VELOCITY_FRAME:-odom}
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_bringup bringup.launch.py"]
    restart: always

  fast_lio:
    extends: nav3d
    container_name: g1_robot_fast_lio
    environment:
      # FAST-LIO already waits for LiDAR/IMU internally. Keep an opt-in delay
      # for unusual deployments, but do not add a fixed 25-second startup wait.
      FAST_LIO_START_DELAY_SEC: ${FAST_LIO_START_DELAY_SEC:-0}
      FAST_LIO_MAPPING_PROFILE: ${FAST_LIO_MAPPING_PROFILE:-default}
      # "auto" preserves the YAML defaults.  The mapping scene launcher sets
      # these explicitly so navigation can never save/overwrite a PCD by
      # merely selecting the default algorithm profile.
      FAST_LIO_MAPPING_MODE: ${FAST_LIO_MAPPING_MODE:-auto}
      FAST_LIO_MAPPING_SAVE: ${FAST_LIO_MAPPING_SAVE:-auto}
      FAST_LIO_MAP_FILE: ${FAST_LIO_MAP_FILE:-}
    command: ["bash", "-lc", "sleep \"$${FAST_LIO_START_DELAY_SEC}\" && source /opt/ros/humble/setup.bash && source /botbrain_ws/install/setup.bash && exec ros2 launch --noninteractive g1_pkg fast_lio.launch.py"]
    stop_signal: SIGINT
    stop_grace_period: 180s
    restart: always

  localization:
    extends: nav3d
    container_name: g1_robot_localization
    profiles: ["navigation"]
    environment:
      MAP_SCENE: ${MAP_SCENE:-ug}
      # Keep global FPFH/RANSAC from starving the real-time FAST-LIO process.
      OMP_NUM_THREADS: "2"
      OMP_DYNAMIC: "FALSE"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OMP_WAIT_POLICY: PASSIVE
      # Scene selection enforces the FAST-LIO-before-localization order.
      # A second fixed delay only postpones /pcd_map visibility.
      LOCALIZATION_START_DELAY_SEC: ${LOCALIZATION_START_DELAY_SEC:-0}
    command: ["bash", "-lc", "sleep \"$${LOCALIZATION_START_DELAY_SEC}\" && source /opt/ros/humble/setup.bash && source /botbrain_ws/install/setup.bash && exec ros2 launch g1_pkg localization_3d.launch.py map_scene:=\"$${MAP_SCENE}\""]
    # Localization is map-specific and must be started explicitly after
    # FAST-LIO. A profile does not prevent an already-created container with
    # restart: always from auto-starting after a robot/Docker reboot.
    restart: "no"

  navigation:
    extends: base
    container_name: g1_robot_navigation
    profiles: ["navigation"]
    environment:
      # The scene selector performs the full readiness check first. Keep a
      # short independent gate here for direct starts, without a blind sleep.
      NAVIGATION_START_DELAY_SEC: ${NAVIGATION_START_DELAY_SEC:-0}
      NAVIGATION_PREFLIGHT_TIMEOUT_SEC: ${NAVIGATION_PREFLIGHT_TIMEOUT_SEC:-60}
    command: ["bash", "-lc", "sleep \"$${NAVIGATION_START_DELAY_SEC}\" && source install/setup.bash && ros2 run bot_navigation navigation_preflight.py --ros-args -p timeout_sec:=\"$${NAVIGATION_PREFLIGHT_TIMEOUT_SEC}.0\" -p min_confidence:=0.50 -p allow_pose_derived_twist:=false && exec ros2 launch bot_navigation navigation.launch.py"]
    # Nav2 must not come up on a stale scan or an uninitialized map transform.
    restart: "no"

  manipulation:
    build:
      context: .
      dockerfile: docker/Dockerfile.manipulation
    image: botbotrobotics/botbrain:manipulation
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - /dev:/dev
      - /run:/run
      - /usr/local/include:/opt/robot_sdk/include:ro
      - /usr/local/lib:/opt/robot_sdk/lib:ro
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      UNITREE_SDK2_ROOT: /opt/robot_sdk
    container_name: g1_robot_manipulation
    command: ["bash", "/botbrain_ws/src/g1_manipulation_pkg/scripts/start_manipulation.sh"]
    restart: always

  jetson_stats:
    extends: base
    container_name: g1_robot_jetson_stats
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_jetson_stats stats.launch.py"]
    restart: always
    
  rosa:
    extends: base
    container_name: g1_robot_rosa
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_rosa rosa.launch.py"]
    restart: always

  yolo_base:
    image: botbotrobotics/botbrain:yolo
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    shm_size: 2gb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      YOLO_CONFIG_DIR: /root/.cache/ultralytics
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      CYCLONEDDS_URI: "file:///botbrain_ws/cyclonedds_config.xml"
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - /dev:/dev
      - /run:/run
      - ./botbrain_ws/src/bot_yolo/models:/root/.cache/ultralytics

  builder_yolo:
    extends: yolo_base
    container_name: g1_robot_builder_yolo
    command: ["bash", "-lc", "colcon build --packages-select \
          bot_yolo"]

  yolo:
    extends: yolo_base
    container_name: g1_robot_yolo
    command: ["bash", "-lc", "source install/setup.bash && ros2 launch bot_yolo yolo.launch.py"]
    restart: always

  dev_yolo:
    extends: yolo_base
    container_name: g1_robot_dev_yolo
    user: root
    command: ["bash"]

  web_server:
    image: node:22-bullseye
    working_dir: /app
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env

  web_server_builder:
    extends: web_server
    container_name: g1_robot_web_server_builder
    network_mode: host
    command: sh -c "npm ci && npm run build:oss"

  web_server_dev:
    extends: web_server
    container_name: g1_robot_web_server_dev
    network_mode: host
    command: sh -c "npm install && npm run dev:oss"
    stdin_open: true
    tty: true

  web_server_prod:
    extends: web_server
    container_name: g1_robot_web_server_prod
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=80
    env_file:
      - ./frontend/.env
    command: npm run start
    restart: unless-stopped
  
  builder_dex3:
    image: unitree-dex3:humble
    container_name: g1_robot_builder_dex3
    network_mode: host
    volumes:
      - ./botbrain_ws/:/botbrain_ws
    command: ["bash", "-lc", "
      source /opt/ros/humble/setup.bash &&
      source /opt/unitree_ros2/cyclonedds_ws/install/setup.bash &&
      cd /botbrain_ws &&
      colcon build --base-paths src
        --packages-select fcl trac_ik_lib unitree_g1_dex3_stack
        --cmake-args -DBUILD_IK_FCL_OMPL_PLANNER=ON -DPython3_EXECUTABLE=/usr/bin/python3 &&
      pip3 install --no-build-isolation --no-deps -e src/g1_right_dex3/unitree_dex3_cpp"]

  dev_dex3:
    image: unitree-dex3:humble
    container_name: g1_robot_dev_dex3
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    volumes:
      - ./botbrain_ws/:/botbrain_ws
      - /dev:/dev
      - /run:/run
    environment:
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      LD_LIBRARY_PATH: /usr/local/lib
      CYCLONEDDS_URI: "file:///botbrain_ws/cyclonedds_config.xml"
      PYTHONPATH: /opt/unitree_dex3_tools:/botbrain_ws/src/g1_right_dex3/unitree_dex3_cpp/build
    command: ["sleep", "infinity"]
    restart: unless-stopped
